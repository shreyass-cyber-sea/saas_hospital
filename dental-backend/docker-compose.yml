version: '3.9'

services:
  dental-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dental-backend
    ports:
      - '3001:3001'
    env_file:
      - .env
    volumes:
      - ./gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dental-net
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/v1']
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: dental-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - dental-net
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  dental-net:
    driver: bridge
